<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#141C26" stroke-width="0.6" opacity="0.09"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#141C26" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Fond papier -->
  <rect width="480" height="360" fill="#ECE8DC"/>
  <rect width="480" height="360" fill="url(#grid)"/>

  <!-- Cadre -->
  <rect x="10" y="10" width="460" height="340" fill="none" stroke="#141C26" stroke-width="1.5"/>

  <!-- Étiquette haut -->
  <text x="22" y="32" font-family="monospace" font-size="9" fill="#4A5563" letter-spacing="0.16em" text-transform="uppercase">EPI PEINTURE · OUTILLAGE · TMF</text>
  <line x1="22" y1="37" x2="460" y2="37" stroke="#141C26" stroke-width="0.8" opacity="0.3"/>

  <!-- ═══════════════════════════════════════
       BOMBES DE PEINTURE (gauche)
       ═══════════════════════════════════════ -->

  <!-- Bombe 1 — rouge -->
  <g filter="url(#shadow)">
    <!-- corps -->
    <rect x="38" y="95" width="44" height="160" rx="8" fill="#B5391C"/>
    <!-- dégradé brillance -->
    <rect x="42" y="99" width="10" height="148" rx="5" fill="rgba(255,255,255,0.22)"/>
    <!-- bande étiquette -->
    <rect x="38" y="145" width="44" height="38" fill="rgba(0,0,0,0.18)"/>
    <text x="60" y="160" font-family="monospace" font-size="6" fill="#ECE8DC" text-anchor="middle" letter-spacing="0.05em">PEINTURE</text>
    <text x="60" y="170" font-family="monospace" font-size="6" fill="#ECE8DC" text-anchor="middle" letter-spacing="0.05em">AÉROSOL</text>
    <!-- col -->
    <rect x="46" y="82" width="28" height="16" rx="5" fill="#2B3640"/>
    <!-- capuchon -->
    <rect x="42" y="68" width="36" height="18" rx="6" fill="#141C26"/>
    <!-- buse -->
    <rect x="56" y="58" width="10" height="14" rx="3" fill="#141C26"/>
    <circle cx="61" cy="57" r="4" fill="#4A5563"/>
    <!-- fond bombe -->
    <rect x="38" y="250" width="44" height="8" rx="4" fill="rgba(0,0,0,0.25)"/>
  </g>

  <!-- Bombe 2 — gris foncé (apprêt) -->
  <g filter="url(#shadow)">
    <rect x="94" y="110" width="42" height="148" rx="8" fill="#2B3640"/>
    <rect x="98" y="114" width="9" height="136" rx="4" fill="rgba(255,255,255,0.12)"/>
    <rect x="94" y="157" width="42" height="34" fill="rgba(255,255,255,0.07)"/>
    <text x="115" y="170" font-family="monospace" font-size="6" fill="#ECE8DC" text-anchor="middle" letter-spacing="0.05em">APPRÊT</text>
    <text x="115" y="180" font-family="monospace" font-size="6" fill="#ECE8DC" text-anchor="middle" letter-spacing="0.05em">GRIS</text>
    <rect x="101" y="98" width="26" height="15" rx="5" fill="#141C26"/>
    <rect x="98" y="84" width="32" height="17" rx="6" fill="#4A5563"/>
    <rect x="110" y="74" width="9" height="13" rx="3" fill="#4A5563"/>
    <circle cx="114" cy="73" r="4" fill="#2B3640"/>
    <rect x="94" y="253" width="42" height="7" rx="3" fill="rgba(0,0,0,0.3)"/>
  </g>

  <!-- ═══════════════════════════════════════
       MASQUE RESPIRATOIRE (centre)
       ═══════════════════════════════════════ -->
  <g filter="url(#shadow)" transform="translate(240,190)">
    <!-- sangles tête haut -->
    <path d="M -32 -52 Q -55 -85 -78 -82" stroke="#141C26" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 32 -52 Q 55 -85 78 -82" stroke="#141C26" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- sangles menton -->
    <path d="M -38 20 Q -60 48 -75 42" stroke="#141C26" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 38 20 Q 60 48 75 42" stroke="#141C26" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- clips sangle -->
    <rect x="-84" y="-88" width="12" height="18" rx="3" fill="#4A5563"/>
    <rect x="72" y="-88" width="12" height="18" rx="3" fill="#4A5563"/>
    <rect x="-82" y="36" width="12" height="14" rx="3" fill="#4A5563"/>
    <rect x="70" y="36" width="12" height="14" rx="3" fill="#4A5563"/>

    <!-- Corps principal masque -->
    <ellipse cx="0" cy="0" rx="68" ry="52" fill="#4A5563"/>
    <!-- pont nasal -->
    <ellipse cx="0" cy="-30" rx="34" ry="16" fill="#4A5563"/>
    <!-- zone visage intérieure -->
    <ellipse cx="0" cy="4" rx="54" ry="38" fill="#3A4550"/>

    <!-- Cartouche filtre gauche -->
    <ellipse cx="-56" cy="8" rx="26" ry="22" fill="#2B3640"/>
    <ellipse cx="-56" cy="8" rx="20" ry="16" fill="#3D4E5A"/>
    <circle cx="-56" cy="8" r="10" fill="none" stroke="#B6B0A0" stroke-width="2"/>
    <circle cx="-56" cy="8" r="4" fill="#8C8473"/>
    <!-- grille filtre gauche -->
    <line x1="-66" y1="8" x2="-46" y2="8" stroke="#B6B0A0" stroke-width="1" opacity="0.5"/>
    <line x1="-56" y1="-2" x2="-56" y2="18" stroke="#B6B0A0" stroke-width="1" opacity="0.5"/>

    <!-- Cartouche filtre droit -->
    <ellipse cx="56" cy="8" rx="26" ry="22" fill="#2B3640"/>
    <ellipse cx="56" cy="8" rx="20" ry="16" fill="#3D4E5A"/>
    <circle cx="56" cy="8" r="10" fill="none" stroke="#B6B0A0" stroke-width="2"/>
    <circle cx="56" cy="8" r="4" fill="#8C8473"/>
    <line x1="46" y1="8" x2="66" y2="8" stroke="#B6B0A0" stroke-width="1" opacity="0.5"/>
    <line x1="56" y1="-2" x2="56" y2="18" stroke="#B6B0A0" stroke-width="1" opacity="0.5"/>

    <!-- Soupape exhalation -->
    <ellipse cx="0" cy="18" rx="12" ry="9" fill="#141C26"/>
    <ellipse cx="0" cy="18" rx="8" ry="6" fill="#2B3640"/>
    <ellipse cx="0" cy="18" rx="4" ry="3" fill="#4A5563"/>

    <!-- Pince nasale -->
    <rect x="-18" y="-42" width="36" height="6" rx="3" fill="#8C8473"/>
  </g>

  <!-- ═══════════════════════════════════════
       CAISSE À OUTILS (droite)
       ═══════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <!-- corps principal -->
    <rect x="318" y="155" width="132" height="100" rx="6" fill="#C68A12"/>
    <!-- face avant ombrage -->
    <rect x="318" y="200" width="132" height="55" rx="0" fill="rgba(0,0,0,0.12)" style="border-radius:0 0 6px 6px"/>
    <!-- ligne de séparation couvercle/corps -->
    <line x1="318" y1="200" x2="450" y2="200" stroke="#141C26" stroke-width="2"/>
    <!-- rivets coins -->
    <circle cx="324" cy="162" r="4" fill="#141C26"/>
    <circle cx="444" cy="162" r="4" fill="#141C26"/>
    <circle cx="324" cy="248" r="4" fill="#141C26"/>
    <circle cx="444" cy="248" r="4" fill="#141C26"/>
    <!-- loquet centre -->
    <rect x="366" y="195" width="36" height="14" rx="4" fill="#141C26"/>
    <rect x="370" y="198" width="28" height="8" rx="3" fill="#C68A12"/>
    <rect x="380" y="197" width="8" height="10" rx="1" fill="#8C8473"/>
    <!-- poignée -->
    <path d="M 355 155 L 355 136 Q 355 126 365 126 L 403 126 Q 413 126 413 136 L 413 155" fill="none" stroke="#141C26" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 355 155 L 355 136 Q 355 126 365 126 L 403 126 Q 413 126 413 136 L 413 155" fill="none" stroke="#C68A12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- séparateurs internes (couvercle ouvert) -->
    <line x1="350" y1="205" x2="350" y2="252" stroke="rgba(20,28,38,0.25)" stroke-width="1.5"/>
    <line x1="384" y1="205" x2="384" y2="252" stroke="rgba(20,28,38,0.25)" stroke-width="1.5"/>
    <line x1="418" y1="205" x2="418" y2="252" stroke="rgba(20,28,38,0.25)" stroke-width="1.5"/>
    <!-- outils visibles dans la caisse -->
    <!-- clé plate -->
    <rect x="326" y="218" width="38" height="7" rx="3.5" fill="#4A5563"/>
    <ellipse cx="326" cy="221" rx="7" ry="5" fill="none" stroke="#4A5563" stroke-width="3"/>
    <ellipse cx="364" cy="221" rx="7" ry="5" fill="none" stroke="#4A5563" stroke-width="3"/>
    <!-- tournevis -->
    <line x1="360" y1="210" x2="360" y2="248" stroke="#B5391C" stroke-width="4" stroke-linecap="round"/>
    <rect x="355" y="207" width="10" height="6" rx="2" fill="#141C26"/>
    <!-- marteau -->
    <line x1="392" y1="212" x2="392" y2="248" stroke="#8C8473" stroke-width="3.5" stroke-linecap="round"/>
    <rect x="384" y="208" width="18" height="10" rx="2" fill="#2B3640"/>
    <!-- pince -->
    <path d="M 424 215 L 430 248 M 436 215 L 430 248" stroke="#4A5563" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="430" cy="213" rx="8" ry="5" fill="#4A5563"/>
  </g>

  <!-- Ombre portée caisse -->
  <ellipse cx="384" cy="262" rx="72" ry="8" fill="rgba(20,28,38,0.14)"/>

  <!-- Étiquette bas -->
  <line x1="22" y1="323" x2="460" y2="323" stroke="#141C26" stroke-width="0.8" opacity="0.3"/>
  <text x="22" y="342" font-family="monospace" font-size="8" fill="#8C8473" letter-spacing="0.1em">AC2 · OUTILS ADAPTÉS À UNE INTERVENTION SIMPLE · RESTAURATION 4L</text>
</svg>
